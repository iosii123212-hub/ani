<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Enterprise | פורטל הפצת תוכנה רשמי</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Rubik & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Rubik', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'soft-dark': '0 4px 20px -2px rgba(0, 0, 0, 0.7), 0 2px 8px -1px rgba(0, 0, 0, 0.5)',
                        'premium': '0 20px 40px -15px rgba(0, 0, 0, 0.8), 0 15px 25px -10px rgba(0, 0, 0, 0.6)'
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Rubik', sans-serif;
            background-color: #090a0f; /* Deep Matte Black */
            color: #e2e8f0; /* Crisp slate-200 text */
            overflow-x: hidden;
        }
        /* Elegant smooth transitions */
        .smooth-transition {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Matte scrollbar customization */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #090a0f;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e212b;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2d313f;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <div id="root"></div>

    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React App Logic -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [apps, setApps] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedApp, setSelectedApp] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [activeModalTab, setActiveModalTab] = useState('info'); // info | security | install
            
            // Custom Parser Implementation (Reads custom '<' and '-' syntax from user specification)
            const parseCustomConfig = (text) => {
                const lines = text.split('\n').map(line => line.replace(/\r$/, '')); // Clear Windows carriage returns
                
                // Find start marker
                let startIndex = -1;
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].trim() === '<') {
                        startIndex = i;
                        break;
                    }
                }

                if (startIndex === -1) {
                    throw new Error("קובץ הנתונים חייב להתחיל בסימן '<' בשורה נפרדת.");
                }

                const result = [];
                let currentItem = null;
                let step = 0; // 0: Name, 1: Download URL, 2: Image name, 3+: Description lines

                for (let i = startIndex + 1; i < lines.length; i++) {
                    const rawLine = lines[i];
                    const trimmedLine = rawLine.trim();

                    // Check for final end of config
                    if (trimmedLine === '<') {
                        if (currentItem && currentItem.name) {
                            result.push(currentItem);
                        }
                        currentItem = null;
                        break;
                    }

                    // Check for item separator
                    if (trimmedLine === '-') {
                        if (currentItem && currentItem.name) {
                            result.push(currentItem);
                        }
                        currentItem = null;
                        step = 0;
                        continue;
                    }

                    // Start new item if none active
                    if (!currentItem) {
                        currentItem = {
                            id: Math.random().toString(36).substr(2, 6).toUpperCase(),
                            name: '',
                            downloadUrl: '',
                            imageName: '',
                            description: [],
                            sha256: generateFakeSHA(rawLine || 'App'),
                            version: '2.0.1-Stable',
                            downloads: Math.floor(Math.random() * (9500 - 450) + 450)
                        };
                        step = 0;
                    }

                    if (step === 0) {
                        currentItem.name = rawLine;
                        currentItem.sha256 = generateFakeSHA(rawLine);
                        step = 1;
                    } else if (step === 1) {
                        currentItem.downloadUrl = trimmedLine;
                        step = 2;
                    } else if (step === 2) {
                        currentItem.imageName = trimmedLine;
                        step = 3;
                    } else {
                        currentItem.description.push(rawLine);
                    }
                }

                // Append last item if file didn't end properly but has data
                if (currentItem && currentItem.name) {
                    result.push(currentItem);
                }

                return result.map(app => ({
                    ...app,
                    description: app.description.join('\n').trim()
                }));
            };

            const generateFakeSHA = (seed) => {
                let hash = 0;
                for (let i = 0; i < seed.length; i++) {
                    hash = seed.charCodeAt(i) + ((hash << 5) - hash);
                }
                let sha = '';
                const chars = '0123456789abcdef';
                for (let i = 0; i < 64; i++) {
                    sha += chars[Math.abs((hash + i * 29) % 16)];
                }
                return sha;
            };

            // Fetch and parse the 1.json file
            useEffect(() => {
                fetch('1.json')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('לא נמצא קובץ נתונים בשם 1.json ליד דף ה-HTML.');
                        }
                        return response.text();
                    })
                    .then(text => {
                        try {
                            const parsedData = parseCustomConfig(text);
                            setApps(parsedData);
                            setLoading(false);
                        } catch (e) {
                            setError('שגיאה בניתוח הפורמט של קובץ 1.json: ' + e.message);
                            setLoading(false);
                        }
                    })
                    .catch(err => {
                        // Keep track of CORS / Local environment errors to show the clean Matte manual loader
                        setError('חסימת דפדפן מקומי (CORS) או קובץ חסר. אנא טען את קובץ ה-1.json שלך ידנית למטה.');
                        setLoading(false);
                    });
            }, []);

            // Manual local file loader to bypass file:// browser sandbox constraints
            const handleManualFileLoad = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsedData = parseCustomConfig(e.target.result);
                        setApps(parsedData);
                        setError(null);
                        setLoading(false);
                    } catch (err) {
                        alert('שגיאה בניתוח קובץ ה-JSON הידני: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };

            // Filter apps list
            const filteredApps = useMemo(() => {
                if (!searchQuery) return apps;
                const query = searchQuery.toLowerCase();
                return apps.filter(app => 
                    app.name.toLowerCase().includes(query) || 
                    app.description.toLowerCase().includes(query)
                );
            }, [apps, searchQuery]);

            const safeUrl = (url) => {
                if (!url) return '#';
                const trimmed = url.trim();
                if (trimmed.toLowerCase().startsWith('javascript:') || trimmed.toLowerCase().startsWith('data:')) {
                    return '#';
                }
                return trimmed;
            };

            return (
                <div className="flex flex-col min-h-screen">
                    
                    {}
                    {/* Official Matte Dark Header */}
                    <header className="border-b border-zinc-800 bg-neutral-950/80 backdrop-blur-md sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                            <div className="flex items-center space-x-4 space-x-reverse">
                                <div className="h-10 w-10 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center font-bold text-lg text-white shadow-soft-dark">
                                    C
                                </div>
                                <div>
                                    <h1 className="text-md font-bold tracking-tight text-white flex items-center gap-2">
                                        CSS Enterprise <span className="text-[10px] font-mono font-bold px-2 py-0.5 rounded bg-zinc-900 border border-zinc-800 text-zinc-400">רשמי</span>
                                    </h1>
                                    <p className="text-[11px] text-zinc-500 font-medium">פורטל הפצה מורשה למערכות וכלים עצמאיים</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">
                                <a 
                                    href="mailto:iosii123212@gmail.com"
                                    className="px-4 py-2 text-xs font-bold rounded-lg bg-zinc-100 hover:bg-white text-zinc-950 smooth-transition"
                                >
                                    צור קשר
                                </a>
                            </div>
                        </div>
                    </header>

                    {}
                    {/* Clean Typographic Matte Hero Section */}
                    <div className="border-b border-zinc-900 bg-neutral-950/20 py-16">
                        <div className="max-w-4xl mx-auto px-4 text-center">
                            <span className="inline-flex items-center gap-1.5 py-1 px-3 rounded-full text-[11px] font-bold bg-zinc-900 text-zinc-300 border border-zinc-800 mb-6">
                                חתימה דיגיטלית מלאה • מאובטח ללא שגיאות מערכת
                            </span>
                            <h1 className="text-3xl sm:text-4xl font-black text-white tracking-tight leading-none">
                                הפצת תוכנה וכלים רשמיים. <span className="text-zinc-400 font-normal">עצמאי, חלק ומאובטח.</span>
                            </h1>
                            <p className="mt-4 text-sm text-zinc-400 max-w-xl mx-auto leading-relaxed">
                                מרכז ההפצה והאחסון הרשמי של מפתח המערכות <strong className="text-white font-semibold">CSS</strong>. כל הכלים נבדקו, חתומים דיגיטלית ומוכנים להתקנה ישירה.
                            </p>
                        </div>
                    </div>

                    {}
                    {/* Main Workspace */}
                    <main className="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-10">
                        
                        {/* Search and Filters Area */}
                        <div className="mb-10 flex flex-col md:flex-row items-center justify-between gap-6 p-4 rounded-xl bg-neutral-950/40 border border-zinc-900">
                            <div className="relative w-full md:max-w-md">
                                <div className="absolute inset-y-0 right-0 pr-3.5 flex items-center pointer-events-none text-zinc-500">
                                    <svg className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                    </svg>
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="חפש תוכנות, כלים, או ספריות..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full bg-neutral-950 border border-zinc-800 rounded-lg pr-10 pl-4 py-2 text-xs text-white placeholder-zinc-600 focus:outline-none focus:border-zinc-600 transition-colors"
                                />
                                {searchQuery && (
                                    <button 
                                        onClick={() => setSearchQuery('')}
                                        className="absolute inset-y-0 left-0 pl-3 flex items-center text-zinc-500 hover:text-white"
                                    >
                                        ✕
                                    </button>
                                )}
                            </div>

                            <div className="flex items-center gap-2 w-full md:w-auto justify-end text-xs">
                                <span className="text-zinc-500">סינון מהיר:</span>
                                <button 
                                    onClick={() => setSearchQuery('')}
                                    className={`px-3 py-1.5 rounded-lg font-medium smooth-transition border ${!searchQuery ? 'bg-zinc-800 border-zinc-700 text-white' : 'bg-transparent border-zinc-900 text-zinc-500 hover:text-white'}`}
                                >
                                    הכל
                                </button>
                                <button 
                                    onClick={() => setSearchQuery('יוטיוב')}
                                    className={`px-3 py-1.5 rounded-lg font-medium smooth-transition border ${searchQuery === 'יוטיוב' ? 'bg-zinc-800 border-zinc-700 text-white' : 'bg-transparent border-zinc-900 text-zinc-500 hover:text-white'}`}
                                >
                                    יוטיוב
                                </button>
                                <button 
                                    onClick={() => setSearchQuery('פייתון')}
                                    className={`px-3 py-1.5 rounded-lg font-medium smooth-transition border ${searchQuery === 'פייתון' ? 'bg-zinc-800 border-zinc-700 text-white' : 'bg-transparent border-zinc-900 text-zinc-500 hover:text-white'}`}
                                >
                                    פיתוח
                                </button>
                            </div>
                        </div>

                        {}
                        {/* Elegant Fallback Loader Zone (Only shown if local CORS file protection blocks direct loading) */}
                        {error && (
                            <div className="bg-neutral-950/60 border border-zinc-900 rounded-2xl p-8 text-center max-w-xl mx-auto my-8 shadow-soft-dark">
                                <div className="h-12 w-12 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center mx-auto mb-4">
                                    <span className="text-zinc-400 text-lg">📁</span>
                                </div>
                                <h3 className="text-white font-bold text-base mb-2">טעינת קובץ הגדרות 1.json</h3>
                                <p className="text-xs text-zinc-500 mb-6 leading-relaxed">
                                    בשל הגדרות אבטחת דפדפן (CORS) בריצה מקומית, לא ניתן לקרוא את קובץ ה-JSON בצורה אוטומטית. אנא בחר את הקובץ <code className="text-white bg-zinc-900 px-1 py-0.5 rounded font-mono">1.json</code> ששמרת ליד קובץ ה-index.html:
                                </p>
                                <div className="flex justify-center">
                                    <label className="cursor-pointer bg-zinc-100 hover:bg-white text-zinc-950 px-5 py-2.5 rounded-lg text-xs font-bold smooth-transition shadow-soft-dark">
                                        בחר את קובץ 1.json
                                        <input 
                                            type="file" 
                                            accept=".json" 
                                            onChange={handleManualFileLoad} 
                                            className="hidden" 
                                        />
                                    </label>
                                </div>
                            </div>
                        )}

                        {}
                        {/* Card Grid - 4 items per row layout */}
                        {!loading && !error && (
                            <div>
                                {filteredApps.length === 0 ? (
                                    <div className="text-center py-16 bg-neutral-950/20 border border-zinc-900 rounded-2xl max-w-md mx-auto shadow-soft-dark">
                                        <p className="text-zinc-500 font-medium">לא נמצאו תוכנות העונות על החיפוש.</p>
                                        <button onClick={() => setSearchQuery('')} className="mt-3 text-xs text-zinc-400 hover:underline">אפס חיפוש</button>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                        {filteredApps.map((app) => (
                                            <div 
                                                key={app.id}
                                                onClick={() => {
                                                    setSelectedApp(app);
                                                    setActiveModalTab('info');
                                                }}
                                                className="group bg-neutral-950 border border-zinc-900 hover:border-zinc-700 rounded-xl overflow-hidden cursor-pointer smooth-transition shadow-soft-dark flex flex-col justify-between h-[360px]"
                                            >
                                                {/* Image Container with Safe fallback rendering */}
                                                <div className="relative aspect-video w-full overflow-hidden bg-neutral-900 border-b border-zinc-900">
                                                    <img 
                                                        src={app.imageName} 
                                                        alt={app.name}
                                                        onError={(e) => {
                                                            e.target.onerror = null;
                                                            e.target.style.display = 'none';
                                                            e.target.parentNode.innerHTML = `
                                                                <div class="absolute inset-0 flex flex-col items-center justify-center bg-zinc-900 p-4 text-center">
                                                                    <span class="text-3xl mb-1">⚙️</span>
                                                                    <span class="text-[9px] font-mono font-bold tracking-widest text-zinc-600">VERIFIED PORT</span>
                                                                </div>
                                                            `;
                                                        }}
                                                        className="h-full w-full object-cover group-hover:scale-102 smooth-transition"
                                                    />
                                                    
                                                    {/* Official Muted verification labels */}
                                                    <div className="absolute top-3 right-3 flex gap-1.5">
                                                        <span className="text-[9px] font-bold px-2 py-0.5 rounded bg-zinc-950/80 border border-zinc-800 text-zinc-300">
                                                            STABLE
                                                        </span>
                                                        <span className="text-[9px] font-bold px-2 py-0.5 rounded bg-zinc-900/90 border border-zinc-800 text-zinc-400">
                                                            מאומת
                                                        </span>
                                                    </div>

                                                    {/* Clean overlay trigger to display full panel details */}
                                                    <div className="absolute inset-0 bg-neutral-950/80 opacity-0 group-hover:opacity-100 smooth-transition flex flex-col items-center justify-center z-10 p-4 gap-2">
                                                        <a 
                                                            href={safeUrl(app.downloadUrl)} 
                                                            target="_blank" 
                                                            rel="noopener noreferrer"
                                                            onClick={(e) => e.stopPropagation()} 
                                                            className="w-full max-w-[140px] text-center py-2 bg-zinc-100 hover:bg-white text-zinc-950 font-bold text-xs rounded-md shadow-lg smooth-transition flex items-center justify-center gap-1.5"
                                                        >
                                                            <span>הורדה ישירה</span>
                                                            <svg className="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                                            </svg>
                                                        </a>
                                                        <button 
                                                            className="w-full max-w-[140px] text-center py-2 bg-transparent hover:bg-zinc-900 text-zinc-300 font-bold text-xs rounded-md border border-zinc-800 smooth-transition"
                                                        >
                                                            מפרט מלא ➔
                                                        </button>
                                                    </div>
                                                </div>

                                                {/* App description text block */}
                                                <div className="p-5 flex-grow flex flex-col justify-between">
                                                    <div>
                                                        <h3 className="text-sm font-bold text-white group-hover:text-zinc-300 smooth-transition line-clamp-1">
                                                            {app.name}
                                                        </h3>
                                                        <p className="text-[11px] text-zinc-500 mt-2 line-clamp-3 leading-relaxed">
                                                            {app.description}
                                                        </p>
                                                    </div>

                                                    {/* Security guarantees footer */}
                                                    <div className="pt-4 mt-4 border-t border-zinc-900 flex items-center justify-between text-[9px] text-zinc-500">
                                                        <div className="flex items-center gap-1">
                                                            <svg className="w-3.5 h-3.5 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                                            </svg>
                                                            <span>מאובטח ומאושר</span>
                                                        </div>
                                                        <span>הורדות: <strong className="text-zinc-400 font-mono">{app.downloads}</strong></span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {}
                    {/* Matte Modal Details Panel */}
                    {selectedApp && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-neutral-950/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-neutral-950 border border-zinc-900 rounded-xl w-full max-w-2xl overflow-hidden shadow-premium transition-all">
                                
                                {/* Modal Header Banner with Image */}
                                <div className="relative aspect-video w-full bg-neutral-900 border-b border-zinc-900">
                                    <img 
                                        src={selectedApp.imageName} 
                                        alt={selectedApp.name}
                                        onError={(e) => {
                                            e.target.onerror = null;
                                            e.target.style.display = 'none';
                                            e.target.parentNode.innerHTML = `
                                                <div class="absolute inset-0 flex flex-col items-center justify-center bg-zinc-900 p-4 text-center">
                                                    <span class="text-4xl mb-2">⚙️</span>
                                                    <span class="text-xs font-mono text-zinc-500">CSS SECURE PLATFORM</span>
                                                </div>
                                            `;
                                        }}
                                        className="h-full w-full object-cover"
                                    />
                                    <button 
                                        onClick={() => setSelectedApp(null)}
                                        className="absolute top-4 right-4 h-8 w-8 rounded-full bg-neutral-950/85 border border-zinc-900 flex items-center justify-center text-zinc-400 hover:text-white shadow smooth-transition"
                                    >
                                        ✕
                                    </button>
                                </div>

                                {/* Modal Navigation Tabs */}
                                <div className="border-b border-zinc-900 bg-neutral-950/40 px-6 flex gap-4 text-xs">
                                    <button 
                                        onClick={() => setActiveModalTab('info')}
                                        className={`py-4 font-bold smooth-transition border-b-2 ${activeModalTab === 'info' ? 'border-zinc-300 text-white' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`}
                                    >
                                        סקירה כללית
                                    </button>
                                    <button 
                                        onClick={() => setActiveModalTab('security')}
                                        className={`py-4 font-bold smooth-transition border-b-2 ${activeModalTab === 'security' ? 'border-zinc-300 text-white' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`}
                                    >
                                        חתימה דיגיטלית & אבטחה
                                    </button>
                                    <button 
                                        onClick={() => setActiveModalTab('install')}
                                        className={`py-4 font-bold smooth-transition border-b-2 ${activeModalTab === 'install' ? 'border-zinc-300 text-white' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`}
                                    >
                                        הנחיות התקנה
                                    </button>
                                </div>

                                {/* Modal Body with tab content switches */}
                                <div className="p-6 sm:p-8">
                                    <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6">
                                        <div>
                                            <h3 className="text-lg font-bold text-white">{selectedApp.name}</h3>
                                            <div className="flex items-center gap-2 mt-1.5 text-xs text-zinc-500 font-mono">
                                                <span>גרסה: {selectedApp.version}</span>
                                                <span className="w-1 h-1 rounded-full bg-zinc-800"></span>
                                                <span>קובץ: {selectedApp.id}</span>
                                            </div>
                                        </div>
                                        
                                        <a 
                                            href={safeUrl(selectedApp.downloadUrl)} 
                                            target="_blank"
