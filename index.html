<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Enterprise | פורטל הפצת תוכנה וכלים רשמי</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Rubik & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Rubik', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 2px 8px -1px rgba(0, 0, 0, 0.03)',
                        'premium': '0 20px 40px -15px rgba(15, 23, 42, 0.08), 0 15px 25px -10px rgba(15, 23, 42, 0.04)',
                        'glow': '0 0 20px rgba(99, 102, 241, 0.15)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Rubik', sans-serif;
            background-color: #f8fafc; /* Sleek Slate-50 background */
            color: #0f172a; /* Deep Slate-900 text */
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.03) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.03) 0%, transparent 35%);
            background-attachment: fixed;
        }
        /* Smooth transitions */
        .smooth-transition {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Custom subtle scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <div id="root"></div>

    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React App Logic -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [apps, setApps] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedApp, setSelectedApp] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [showCreator, setShowCreator] = useState(false);
            const [activeModalTab, setActiveModalTab] = useState('info'); // info | security | install
            const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

            // Simulated official environment server check
            const [serverStatus, setServerStatus] = useState({ ping: 12, load: 'תקין' });
            useEffect(() => {
                const interval = setInterval(() => {
                    setServerStatus({
                        ping: Math.floor(Math.random() * (16 - 8) + 8),
                        load: Math.random() > 0.85 ? 'עמוס חלקית' : 'תקין'
                    });
                }, 5000);
                return () => clearInterval(interval);
            }, []);

            // Helper for Toast notification instead of alert()
            const triggerToast = (message, type = 'info') => {
                setToast({ show: true, message, type });
                setTimeout(() => {
                    setToast(prev => ({ ...prev, show: false }));
                }, 3500);
            };

            // Fetch and parse the 1.json file
            useEffect(() => {
                fetch('1.json')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('לא נמצא קובץ נתונים בשם 1.json ליד דף ה-HTML.');
                        }
                        return response.text();
                    })
                    .then(text => {
                        try {
                            const parsedData = parseCustomConfig(text);
                            setApps(parsedData);
                            setLoading(false);
                        } catch (e) {
                            setError('שגיאה בניתוח הפורמט של קובץ 1.json: ' + e.message);
                            setLoading(false);
                        }
                    })
                    .catch(err => {
                        setError(err.message);
                        setLoading(false);
                    });
            }, []);

            // Custom Parser Implementation (as specified by user)
            const parseCustomConfig = (text) => {
                const lines = text.split('\n').map(line => line.replace(/\r$/, '')); // Clear Windows carriage returns
                
                // Find start marker
                let startIndex = -1;
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].trim() === '<') {
                        startIndex = i;
                        break;
                    }
                }

                if (startIndex === -1) {
                    throw new Error("קובץ הנתונים חייב להתחיל בסימן '<' בשורה נפרדת.");
                }

                const result = [];
                let currentItem = null;
                let step = 0; // 0: Name, 1: Download URL, 2: Image name, 3+: Description lines

                for (let i = startIndex + 1; i < lines.length; i++) {
                    const rawLine = lines[i];
                    const trimmedLine = rawLine.trim();

                    // Check for final end of config
                    if (trimmedLine === '<') {
                        if (currentItem && currentItem.name) {
                            result.push(currentItem);
                        }
                        currentItem = null;
                        break;
                    }

                    // Check for item separator
                    if (trimmedLine === '-') {
                        if (currentItem && currentItem.name) {
                            result.push(currentItem);
                        }
                        currentItem = null;
                        step = 0;
                        continue;
                    }

                    // Start new item if none active
                    if (!currentItem) {
                        currentItem = {
                            id: Math.random().toString(36).substr(2, 6).toUpperCase(),
                            name: '',
                            downloadUrl: '',
                            imageName: '',
                            description: [],
                            sha256: generateFakeSHA(rawLine || 'App'),
                            version: '2.0.1-Stable',
                            downloads: Math.floor(Math.random() * (9500 - 450) + 450)
                        };
                        step = 0;
                    }

                    if (step === 0) {
                        currentItem.name = rawLine;
                        currentItem.sha256 = generateFakeSHA(rawLine);
                        step = 1;
                    } else if (step === 1) {
                        currentItem.downloadUrl = trimmedLine;
                        step = 2;
                    } else if (step === 2) {
                        currentItem.imageName = trimmedLine;
                        step = 3;
                    } else {
                        currentItem.description.push(rawLine);
                    }
                }

                // Append last item if file didn't end properly but has data
                if (currentItem && currentItem.name) {
                    result.push(currentItem);
                }

                return result.map(app => ({
                    ...app,
                    description: app.description.join('\n').trim()
                }));
            };

            const generateFakeSHA = (seed) => {
                let hash = 0;
                for (let i = 0; i < seed.length; i++) {
                    hash = seed.charCodeAt(i) + ((hash << 5) - hash);
                }
                let sha = '';
                const chars = '0123456789abcdef';
                for (let i = 0; i < 64; i++) {
                    sha += chars[Math.abs((hash + i * 29) % 16)];
                }
                return sha;
            };

            // Filter apps list
            const filteredApps = useMemo(() => {
                if (!searchQuery) return apps;
                const query = searchQuery.toLowerCase();
                return apps.filter(app => 
                    app.name.toLowerCase().includes(query) || 
                    app.description.toLowerCase().includes(query)
                );
            }, [apps, searchQuery]);

            // Form helper states for 1.json generation
            const [creatorApps, setCreatorApps] = useState([
                { name: 'הורדה מיוטיוב Pro', url: 'https://download-link-example.com', img: '1.png', desc: 'תוכנה מטורפת בהחלט להורדת סרטונים ושירים מיוטיוב במהירות שיא.\nפותח על ידי CSS.\nכולל תמיכה ברזולוציית 4K וממיר מובנה.' }
            ]);

            const addNewCreatorApp = () => {
                setCreatorApps([...creatorApps, { name: '', url: '', img: '', desc: '' }]);
                triggerToast('נוספה כרטיסיית תוכנה חדשה בטופס', 'success');
            };

            const updateCreatorApp = (index, field, value) => {
                const updated = [...creatorApps];
                updated[index][field] = value;
                setCreatorApps(updated);
            };

            const removeCreatorApp = (index) => {
                const updated = creatorApps.filter((_, i) => i !== index);
                setCreatorApps(updated);
                triggerToast('התוכנה הוסרה מהטופס', 'info');
            };

            const generatedConfigText = useMemo(() => {
                let txt = "<\n";
                creatorApps.forEach((app, idx) => {
                    txt += `${app.name || 'שם תוכנה'}\n`;
                    txt += `${app.url || 'https://link-to-download'}\n`;
                    txt += `${app.img || 'image.png'}\n`;
                    txt += `${app.desc || 'תיאור התוכנה'}\n`;
                    if (idx < creatorApps.length - 1) {
                        txt += "-\n";
                    }
                });
                txt += "<";
                return txt;
            }, [creatorApps]);

            // Fake list for live previewing the creator cards
            const livePreviewApps = useMemo(() => {
                return creatorApps.map((app, index) => ({
                    id: `preview-${index}`,
                    name: app.name || 'שם תוכנה להדגמה',
                    downloadUrl: app.url || '#',
                    imageName: app.img || '',
                    description: app.desc || 'התיאור שלך יופיע כאן בלייב בזמן ההקלדה...',
                    sha256: generateFakeSHA(app.name || 'Preview'),
                    version: '2.0.0-Demo',
                    downloads: 142
                }));
            }, [creatorApps]);

            const handleCopyText = (text) => {
                const tempTextArea = document.createElement("textarea");
                tempTextArea.value = text;
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                try {
                    document.execCommand('copy');
                    triggerToast("הגדרות קובץ 1.json הועתקו ללוח בהצלחה!", "success");
                } catch (err) {
                    triggerToast("שגיאה בהעתקה. אנא העתק ידנית.", "error");
                }
                document.body.removeChild(tempTextArea);
            };

            const safeUrl = (url) => {
                if (!url) return '#';
                const trimmed = url.trim();
                if (trimmed.toLowerCase().startsWith('javascript:') || trimmed.toLowerCase().startsWith('data:')) {
                    return '#';
                }
                return trimmed;
            };

            return (
                <div className="flex flex-col min-h-screen">
                    
                    {}
                    {/* Global Toast Alert */}
                    {toast.show && (
                        <div className={`fixed top-6 left-6 z-50 flex items-center gap-3 px-5 py-4 rounded-xl shadow-premium border smooth-transition transform translate-y-0 ${
                            toast.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' :
                            toast.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-800' :
                            'bg-slate-50 border-slate-200 text-slate-800'
                        }`}>
                            <span className="text-base">
                                {toast.type === 'success' ? '✓' : toast.type === 'error' ? '⚠' : 'ℹ'}
                            </span>
                            <span className="text-sm font-medium">{toast.message}</span>
                        </div>
                    )}

                    {/* Official Corporate Header */}
                    <header className="border-b border-slate-200 bg-white/85 backdrop-blur-md sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                            <div className="flex items-center space-x-4 space-x-reverse">
                                <div className="h-10 w-10 rounded-xl bg-slate-900 flex items-center justify-center font-bold text-lg text-white shadow-soft">
                                    C
                                </div>
                                <div>
                                    <h1 className="text-md font-bold tracking-tight text-slate-950 flex items-center gap-2">
                                        CSS Enterprise <span className="text-[10px] font-mono font-bold px-2 py-0.5 rounded-full bg-slate-100 border border-slate-200 text-slate-600">v2.5 Official</span>
                                    </h1>
                                    <p className="text-[11px] text-slate-500 font-medium">מרכז הפצה מורשה למערכות קוד פתוח וכלים</p>
                                </div>
                            </div>

                            {/* Official Server Status Tracker */}
                            <div className="hidden lg:flex items-center gap-6 px-4 py-2 rounded-lg bg-slate-50 border border-slate-100 text-xs text-slate-600 font-mono">
                                <div className="flex items-center gap-2">
                                    <span className="relative flex h-2 w-2">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-500 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                    </span>
                                    <span>שרת הפצה: <strong className="text-slate-800">מקוון</strong></span>
                                </div>
                                <div className="w-px h-3 bg-slate-200"></div>
                                <div>עומס שרת: <strong className="text-slate-800">{serverStatus.load}</strong></div>
                                <div className="w-px h-3 bg-slate-200"></div>
                                <div>עכבה (Latency): <strong className="text-indigo-600">{serverStatus.ping}ms</strong></div>
                            </div>

                            <div className="flex items-center gap-3">
                                <button 
                                    onClick={() => {
                                        setShowCreator(!showCreator);
                                        window.scrollTo({ top: 0, behavior: 'smooth' });
                                    }} 
                                    className="px-4 py-2 text-xs font-semibold rounded-lg bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 transition-all shadow-soft"
                                >
                                    {showCreator ? "חזרה לפורטל" : "🛠️ מחולל קוד 1.json"}
                                </button>
                                <a 
                                    href="mailto:iosii123212@gmail.com"
                                    className="px-4 py-2 text-xs font-bold rounded-lg bg-slate-900 text-white hover:bg-slate-800 transition-all shadow-soft"
                                >
                                    צור קשר
                                </a>
                            </div>
                        </div>
                    </header>

                    {}
                    {/* Modern Clean Hero Section */}
                    {!showCreator && (
                        <div className="bg-white border-b border-slate-200/80 py-16">
                            <div className="max-w-5xl mx-auto px-4 text-center">
                                <span className="inline-flex items-center gap-1.5 py-1 px-3 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-800 border border-emerald-200/50 mb-6">
                                    <svg className="w-3.5 h-3.5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                    </svg>
                                    חתימה דיגיטלית מלאה • מאובטח ונקי משגיאות
                                </span>
                                <h1 className="text-4xl sm:text-5xl font-black text-slate-900 tracking-tight leading-none">
                                    הפצת תוכנה וכלים רשמיים. <span className="text-indigo-600">חלק, מהיר ומאובטח.</span>
                                </h1>
                                <p className="mt-5 text-base sm:text-lg text-slate-500 max-w-2xl mx-auto leading-relaxed font-normal">
                                    פורטל האחסון וההפצה הרשמי של מפתח המערכות <strong className="text-slate-800">CSS</strong>. כל הכלים כאן נבדקו, חתומים דיגיטלית ללא שגיאות מערכת ומוכנים להורדה ישירה.
                                </p>

                                {/* Official Statistics Board */}
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6 max-w-3xl mx-auto mt-12 p-6 rounded-2xl bg-slate-50 border border-slate-200/60 shadow-soft">
                                    <div className="text-center">
                                        <div className="text-2xl font-black text-slate-900">{apps.length}</div>
                                        <div className="text-[11px] text-slate-500 mt-1 font-medium">תוכנות פעילות</div>
                                    </div>
                                    <div className="border-r border-slate-200">
                                        <div className="text-2xl font-black text-emerald-600">Secure</div>
                                        <div className="text-[11px] text-slate-500 mt-1 font-medium">סריקת SHA-256</div>
                                    </div>
                                    <div className="border-r border-slate-200">
                                        <div className="text-2xl font-black text-indigo-600">Direct</div>
                                        <div className="text-[11px] text-slate-500 mt-1 font-medium">שרתי הורדה ישירה</div>
                                    </div>
                                    <div className="border-r border-slate-200">
                                        <div className="text-2xl font-black text-slate-900">2026</div>
                                        <div className="text-[11px] text-slate-500 mt-1 font-medium">גרסה עדכנית ביותר</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Main Workspace */}
                    <main className="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-10">
                        
                        {showCreator ? (
                            /* Professional Splitscreen JSON Creator Studio */
                            <div className="space-y-8 animate-fade-in">
                                <div className="p-6 rounded-2xl bg-white border border-slate-200 shadow-soft">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                        <div>
                                            <h2 className="text-xl font-bold text-slate-900">מחולל קבצי תצורה 1.json רשמי</h2>
                                            <p className="text-xs text-slate-500 mt-1">מלא את טופס התוכנות בצד שמאל. המערכת תייצר קוד תקין וחסין שגיאות ותציג לך תצוגה מקדימה מלאה בלייב.</p>
                                        </div>
                                        <button 
                                            onClick={() => handleCopyText(generatedConfigText)}
                                            className="px-5 py-2.5 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-lg text-xs smooth-transition shadow-soft"
                                        >
                                            💾 העתק קובץ מוכן ללוח
                                        </button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 xl:grid-cols-12 gap-8">
                                    {/* Left inputs column */}
                                    <div className="xl:col-span-5 space-y-6">
                                        <div className="flex justify-between items-center">
                                            <h3 className="text-xs font-bold tracking-wider text-slate-400 uppercase">עריכת נתוני תוכנות</h3>
                                            <button 
                                                onClick={addNewCreatorApp}
                                                className="px-3 py-1.5 text-xs bg-slate-100 hover:bg-slate-200 text-slate-800 rounded-lg font-semibold transition-all"
                                            >
                                                + הוסף תוכנה חדשה לטופס
                                            </button>
                                        </div>

                                        <div className="space-y-4 max-h-[650px] overflow-y-auto pr-2">
                                            {creatorApps.map((app, index) => (
                                                <div key={index} className="p-5 bg-white border border-slate-200 rounded-xl relative shadow-soft">
                                                    <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-2">
                                                        <span className="text-xs font-mono text-slate-400 font-semibold">תוכנה #{index + 1}</span>
                                                        <button 
                                                            onClick={() => removeCreatorApp(index)}
                                                            className="text-rose-500 hover:text-rose-600 text-xs font-semibold smooth-transition"
                                                        >
                                                            הסר מהרשימה ✕
                                                        </button>
                                                    </div>

                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                        <div>
                                                            <label className="block text-xs text-slate-500 mb-1">שם התוכנה</label>
                                                            <input 
                                                                type="text"
                                                                value={app.name}
                                                                onChange={(e) => updateCreatorApp(index, 'name', e.target.value)}
                                                                placeholder="לדוגמה: כלי גיבוי"
                                                                className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-900 focus:outline-none focus:border-indigo-500 transition-colors"
                                                            />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs text-slate-500 mb-1">שם קובץ תמונה</label>
                                                            <input 
                                                                type="text"
                                                                value={app.img}
                                                                onChange={(e) => updateCreatorApp(index, 'img', e.target.value)}
                                                                placeholder="לדוגמה: 1.png"
                                                                className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-900 focus:outline-none focus:border-indigo-500 transition-colors"
                                                            />
                                                        </div>
                                                    </div>

                                                    <div className="mt-4">
                                                        <label className="block text-xs text-slate-500 mb-1">קישור ישיר להורדה</label>
                                                        <input 
                                                            type="text"
                                                            value={app.url}
                                                            onChange={(e) => updateCreatorApp(index, 'url', e.target.value)}
                                                            placeholder="https://..."
                                                            className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-900 focus:outline-none focus:border-indigo-500 transition-colors ltr text-left"
                                                        />
                                                    </div>

                                                    <div className="mt-4">
                                                        <label className="block text-xs text-slate-500 mb-1">תיאור ומידע מורחב</label>
                                                        <textarea 
                                                            value={app.desc}
                                                            onChange={(e) => updateCreatorApp(index, 'desc', e.target.value)}
                                                            placeholder="תיאור מפורט..."
                                                            rows="4"
                                                            className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-900 focus:outline-none focus:border-indigo-500 transition-colors resize-none"
                                                        />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Middle preview column */}
                                    <div className="xl:col-span-4 space-y-6">
                                        <h3 className="text-sm font-bold tracking-wider text-slate-400 uppercase">תצוגה מקדימה באתר בלייב</h3>
                                        <div className="grid grid-cols-1 gap-6 max-h-[650px] overflow-y-auto pr-2">
                                            {livePreviewApps.map((app) => (
                                                <div 
                                                    key={app.id}
